<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUNCH IN — Ten Years of Solidarity · Live Display</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#E8E4F0; --punch:#7A2A4A; --gold:#C8A84B; --font-mono:'IBM Plex Mono',monospace; --font-sans:'IBM Plex Sans',sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-mono); background:var(--bg); overflow:hidden; width:100vw; height:100vh; }

  .display-header { position:fixed; top:0; left:0; right:0; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; z-index:100; background:linear-gradient(to bottom,rgba(30,8,14,0.97) 0%,transparent 100%); }
  .display-title { font-size:13px; letter-spacing:4px; text-transform:uppercase; color:#FFFFFF; }
  .display-subtitle { font-size:11px; letter-spacing:2px; color:rgba(245,240,232,0.3); text-transform:uppercase; }
  .live-indicator { display:flex; align-items:center; gap:8px; font-size:11px; letter-spacing:2px; color:rgba(245,240,232,0.4); text-transform:uppercase; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--punch); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);} }

  #cardStage { position:fixed; inset:0; z-index:1; }

  .float-card { position:absolute; width:250px; border-radius:2px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.3); opacity:0; transition:opacity 1.2s ease; }
  .float-card.visible { opacity:1; animation:floatBig var(--dur) ease-in-out infinite var(--dly); }
  @keyframes floatBig {
    0%   { transform:translateY(0px)   rotate(var(--rot)); }
    25%  { transform:translateY(-55px) rotate(calc(var(--rot) + 0.8deg)); }
    50%  { transform:translateY(-20px) rotate(calc(var(--rot) - 0.5deg)); }
    75%  { transform:translateY(-65px) rotate(calc(var(--rot) + 1.2deg)); }
    100% { transform:translateY(0px)   rotate(var(--rot)); }
  }

  .float-card.role-visitor   { --card-bg:#C8DFF0; --card-ink:#1A2A3A; --card-accent:#2A5A8A; }
  .float-card.role-artist    { --card-bg:#F0C8D8; --card-ink:#2A1A1E; --card-accent:#8A2A4A; }
  .float-card.role-organizer { --card-bg:#F0E8D8; --card-ink:#2A1E10; --card-accent:#8A5A20; }
  .float-card.role-speaker   { --card-bg:#D4E8DA; --card-ink:#1A2A1E; --card-accent:#4A6A54; }
  .float-card.role-default   { --card-bg:#E8E4F0; --card-ink:#1A1428; --card-accent:#7A2A4A; }

  .card-stripe { display:none; }
  .card-inner { background:var(--card-bg); padding:12px 14px; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .card-exhibition { font-size:7px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--card-accent); margin-bottom:2px; }
  .card-name { font-size:13px; font-weight:600; color:var(--card-ink); letter-spacing:0.5px; text-transform:uppercase; }
  .card-num { font-size:10px; font-weight:600; color:var(--card-accent); letter-spacing:1px; }
  .hole-row { display:flex; gap:4px; padding:6px 0; border-top:1px solid rgba(0,0,0,0.1); border-bottom:1px solid rgba(0,0,0,0.1); margin-bottom:10px; }
  .hole { width:6px; height:6px; border-radius:50%; background:rgba(0,0,0,0.12); }
  .hole.punched { background:var(--card-accent); box-shadow:0 0 4px rgba(0,0,0,0.3); }
  .card-quote { font-family:var(--font-sans); font-size:12px; font-weight:500; color:var(--card-ink); line-height:1.5; margin-bottom:8px; padding-left:8px; border-left:2px solid var(--card-accent); }
  .card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
  .card-tag { font-size:7px; letter-spacing:1px; text-transform:uppercase; padding:2px 6px; border:1px solid var(--card-accent); border-radius:1px; color:var(--card-accent); }
  .card-footer { display:flex; justify-content:space-between; align-items:center; padding-top:8px; border-top:1px solid rgba(0,0,0,0.1); }
  .card-time { font-size:8px; color:rgba(0,0,0,0.4); letter-spacing:0.5px; }
  .card-type { font-size:8px; font-weight:600; color:var(--card-accent); letter-spacing:1px; text-transform:uppercase; }

  .display-footer { position:fixed; bottom:0; left:0; right:0; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; z-index:100; background:linear-gradient(to top,rgba(30,8,14,0.97) 0%,transparent 100%); }
  .counter { font-size:11px; letter-spacing:2px; color:rgba(245,240,232,0.4); text-transform:uppercase; }
  .counter span { color:#FFFFFF; font-weight:600; }
  .qr-hint { font-size:11px; letter-spacing:2px; color:rgba(245,240,232,0.4); text-transform:uppercase; }
  .qr-hint em { color:#F0A0B8; font-style:normal; }
</style>
</head>
<body>
<div class="display-header">
  <div>
    <div class="display-title">TEN YEARS OF SOLIDARITY</div>
    <div class="display-subtitle">Punch In · Live Archive</div>
  </div>
  <div class="live-indicator"><div class="live-dot"></div>Live</div>
</div>

<div id="cardStage"></div>

<div class="display-footer">
  <div class="counter">Visitors logged: <span id="totalCount">0</span></div>
  <div class="qr-hint">Scan QR to <em>Punch In</em></div>
</div>

<script>
  const SHEET_ID  = '1H8f7BPS94EuZqJTLAzmT5MbO2v5F6oP-qZRatSUofJg';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

  let displayedIds = new Set();
  let totalPlaced  = 0;

  const ZONES = [
    [ 2,25, 13,35], [32,55, 13,35], [62,78, 13,35],
    [ 2,25, 40,60], [32,55, 40,60], [62,78, 40,60],
    [ 2,25, 65,82], [32,55, 65,82], [62,78, 65,82],
  ];

  function getPos(idx) {
    const z = ZONES[idx % ZONES.length];
    return {
      left: (z[0]+Math.random()*(z[1]-z[0])).toFixed(1)+'vw',
      top:  (z[2]+Math.random()*(z[3]-z[2])).toFixed(1)+'vh'
    };
  }

  function getRoleClass(role) {
    if (!role) return 'role-default';
    const r = role.toLowerCase();
    if (r.includes('visitor'))   return 'role-visitor';
    if (r.includes('artist'))    return 'role-artist';
    if (r.includes('organizer')) return 'role-organizer';
    if (r.includes('speaker'))   return 'role-speaker';
    return 'role-default';
  }

  function makeHoles(seed) {
    let h = '';
    for (let i = 0; i < 12; i++) h += `<div class="hole${((seed>>i)&1)?' punched':''}"></div>`;
    return h;
  }

  function parseResult(t) {
    if (!t) return null;
    try { return JSON.parse(t.replace(/```json|```/g,'').trim()); }
    catch(e) { return null; }
  }

  function placeCard(cardData, idx) {
    const parsed = parseResult(cardData.result);
    if (!parsed) return;

    const pos  = getPos(idx);
    const seed = parsed.seed || Math.floor(Math.random()*4095);
    const rot  = (Math.random()*10-5).toFixed(1)+'deg';
    const dur  = (7+Math.random()*5).toFixed(1)+'s';
    const dly  = '-'+(Math.random()*10).toFixed(1)+'s';
    const tags = (parsed.tags||[]).slice(0,3).map(t=>`<div class="card-tag">${t}</div>`).join('');
    const time = cardData.timestamp ? new Date(cardData.timestamp).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : '';
    const name = (cardData.nickname && String(cardData.nickname).trim()) ? String(cardData.nickname).trim() : 'Anonymous';

    const el = document.createElement('div');
    el.className = `float-card ${getRoleClass(cardData.role)}`;
    el.style.left = pos.left;
    el.style.top  = pos.top;
    el.style.setProperty('--rot', rot);
    el.style.setProperty('--dur', dur);
    el.style.setProperty('--dly', dly);
    el.innerHTML = `
      <div class="card-stripe"></div>
      <div class="card-inner">
        <div class="card-top">
          <div>
            <div class="card-exhibition">CJR · Ten Years of Solidarity</div>
            <div class="card-name">${name}</div>
          </div>
          <div class="card-num">#${String(idx+1).padStart(4,'0')}</div>
        </div>
        <div class="hole-row">${makeHoles(seed)}</div>
        <div class="card-quote">${parsed.key_quote||''}</div>
        <div class="card-tags">${tags}</div>
        <div class="card-footer">
          <div class="card-time">${time}</div>
          <div class="card-type">${parsed.visitor_type||''}</div>
        </div>
      </div>`;

    document.getElementById('cardStage').appendChild(el);
    setTimeout(()=>el.classList.add('visible'), 120);
  }

  async function fetchData() {
    try {
      const res  = await fetch(SHEET_URL+'&t='+Date.now());
      const text = await res.text();
      const json = JSON.parse(
        text.replace('/*O_o*/','').replace('google.visualization.Query.setResponse(','').replace(/\);$/,'')
      );
      const rows = json.table?.rows||[];

      rows.forEach((row,i) => {
        if (displayedIds.has(i)) return;
        const c = row.c||[];
        const result = c[5]?.v??'';
        if (!result) return;

        displayedIds.add(i);
        const idx = totalPlaced++;

        setTimeout(()=>placeCard({
          timestamp: c[0]?.v??'',
          nickname:  c[1]?.v??'',
          role:      c[2]?.v??'',
          language:  c[3]?.v??'',
          response:  c[4]?.v??'',
          result
        }, idx), idx*400);
      });

      document.getElementById('totalCount').textContent = totalPlaced;
    } catch(e){ console.error(e); }
  }

  fetchData();
  setInterval(fetchData, 30000);
</script>
</body>
</html>
